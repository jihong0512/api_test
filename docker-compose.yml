services:
  mysql:
    # 使用官方镜像源（最稳定可靠）
    image: mysql:8.0
    container_name: api_test_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: api_test
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/1-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api_test_network

  redis:
    # 使用官方镜像源（最稳定可靠）
    image: redis:7-alpine
    container_name: api_test_redis
    ports:
      - "6382:6379"
    networks:
      - api_test_network

  minio:
    image: minio/minio:latest
    container_name: api_test_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123456
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - api_test_network

  neo4j:
    # 国内可用镜像源
    image: neo4j:5.15
    container_name: api_test_neo4j
    environment:
      NEO4J_AUTH: neo4j/123456789
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_auth__minimum__password__length: "6"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - api_test_network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "123456789", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_test_backend
    ports:
      - "8004:8004"
    command: uvicorn main:app --host 0.0.0.0 --port 8004
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=api_test
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=123456
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=123456789
      - DEEPSEEK_API_KEY=sk-abebebd1bc2b404fa0556d46912a379e
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - QWEN_API_KEY=sk-5233a3a4b1a24426b6846a432794bbe2
      - QWEN_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - QWEN_MODEL=qwen-vl-plus
      - DOCKER_API_VERSION=1.44
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - chroma_db:/app/chroma_db  # ChromaDB持久化目录
      - ./jmeter/results:/app/jmeter-results:ro  # 只读挂载JMeter结果目录
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - api_test_network

  celery_worker:
    image: apitest-celery_worker:fixed-pydantic
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_test_celery_worker
    command: bash -c "pip install --upgrade pip && pip install --upgrade --force-reinstall --index-url https://pypi.org/simple 'pydantic>=2.0.0,<3.0.0' 'pydantic-settings>=2.0.0' && celery -A app.celery_app worker --loglevel=info --concurrency=4"
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=api_test
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=123456
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=123456789
      - DEEPSEEK_API_KEY=sk-abebebd1bc2b404fa0556d46912a379e
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - QWEN_API_KEY=sk-5233a3a4b1a24426b6846a432794bbe2
      - QWEN_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - QWEN_MODEL=qwen-vl-plus
      - DOCKER_API_VERSION=1.44
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - chroma_db:/app/chroma_db  # ChromaDB持久化目录
      - /var/run/docker.sock:/var/run/docker.sock  # 挂载docker socket以支持docker命令
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - api_test_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: api_test_frontend
    ports:
      - "3006:3000"
    environment:
      # 前端在浏览器中访问后端，使用host.docker.internal或localhost
      # 但更好的方式是使用后端服务的外部端口
      - REACT_APP_API_URL=http://localhost:8004
      - PORT=3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - api_test_network

  jmeter:
    build:
      context: ./jmeter
      dockerfile: Dockerfile
    container_name: api_test_jmeter
    entrypoint: ["/bin/sh","-c"]  # 覆盖默认入口，避免把命令当成jmeter参数
    command: ["sleep infinity"]  # 保持容器一直运行且不触发jmeter参数解析错误
    volumes:
      - ./jmeter/scripts:/app/jmeter-scripts
      - ./jmeter/results:/app/jmeter-results
    networks:
      - api_test_network
    healthcheck:
      test: ["CMD", "jmeter", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  minio_data:
  neo4j_data:
  uploads:
  chroma_db:

networks:
  api_test_network:
    driver: bridge
